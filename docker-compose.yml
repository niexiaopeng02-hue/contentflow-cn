services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contentflow
      POSTGRES_PASSWORD: contentflow
      POSTGRES_DB: contentflow
    ports:
      - "5433:5432"
    volumes:
      - contentflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentflow -d contentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://contentflow:contentflow@db:5432/contentflow
      LLM_PROVIDER: mock
      OPENAI_API_KEY: ""
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  contentflow_pg:
